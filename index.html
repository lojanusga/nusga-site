    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      z-index: 1;
    }
    .card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 1.5rem;
    }
    .bio {
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 2rem;
      max-width: 300px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: transform 0.15s, background 0.15s;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); }
    .btn:active { transform: scale(0.98); }
    .btn svg { flex-shrink: 0; }
    .btn-label { flex: 1; text-align: left; }
    .btn.whatsapp { border-color: rgba(37,211,102,0.35); }
    .btn.instagram { border-color: rgba(225,48,108,0.35); }
    @media (min-width: 600px) {
      .logo { width: 140px; height: 140px; }
      .bio { font-size: 15px; }
    }
  </style>
</head>

  <div class="bg"></div>
